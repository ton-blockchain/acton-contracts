name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  test-1:
    name: Test 1
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/cache
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'latest'

      - name: Version
        run: acton --version

  test-2:
    name: Test 2
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/cache
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: '0.3.0'
          save-cache: false

      - name: Version
        run: acton --version

  test-3:
    name: Test 3
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/cache
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          working-directory: 'kek'

      - name: Version
        run: acton --version

  test-4:
    name: Test 4
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/cache
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}

      - name: Version
        run: acton --version

  test-5:
    name: Test 5
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/cache
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'
          architecture: 'aarch64'
          platform: 'apple'

      - name: Version
        run: acton --version

  test-6:
    name: Test 6
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/cache
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'
          platform: 'linux'

      - name: Version
        run: acton --version

  test-7:
    name: Test 7
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/cache
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'
          platform: 'apple'

      - name: Version
        run: acton --version

  test-8:
    name: Test 8
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/cache
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          platform: 'apple'

      - name: Version
        run: acton --version
