name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubicloud-standard-2

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@master
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          acton-version: 'trunk'

      - name: Version
        run: acton --version

      - name: Build
        run: acton build

      - name: Test
        run: acton test

      - name: Linter
        run: acton check --output-format github

      - name: Formatter
        run: acton fmt --check
