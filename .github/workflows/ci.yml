name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  test-1:
    name: Test 1
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/checksum
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'latest'

      - name: Version
        run: acton --version

  test-2:
    name: Test 2
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/checksum
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'

      - name: Version
        run: acton --version

  test-3:
    name: Test 3
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/checksum
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'
          checksum: 'cc51f7974010c0216af591b88909503cc6e5bba0635c0678908da58cc4dcd6d1'

      - name: Version
        run: acton --version

  test-4:
    name: Test 4
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/checksum
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'
          checksum: '1c51f7974010c0216af591b88909503cc6e5bba0635c0678908da58cc4dcd6dc'

      - name: Version
        run: acton --version

  test-5:
    name: Test 5
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/checksum
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'
          architecture: 'aarch64'
          platform: 'apple'

      - name: Version
        run: acton --version

  test-6:
    name: Test 6
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/checksum
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'
          platform: 'linux'

      - name: Version
        run: acton --version

  test-7:
    name: Test 7
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@danil42russia/checksum
        with:
          github-token: ${{ secrets.ACTON_TOKEN }}
          version: 'trunk'
          platform: 'apple'

      - name: Version
        run: acton --version
