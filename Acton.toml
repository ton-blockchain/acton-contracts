[package]
name = "acton-contracts"
description = "Rewritten Acton contracts monorepo"
version = "0.1.0"
license = "MIT"

[contracts.Config]
src = "config/contracts/Config.tolk"
depends = []

[contracts.Counter]
src = "counter/contracts/Counter.tolk"
depends = []

[contracts.DnsCollection]
src = "dns/contracts/DnsCollection.tolk"
depends = []

[contracts.DnsItem]
src = "dns/contracts/DnsItem.tolk"
depends = []

[contracts.Elector]
src = "elector/contracts/Elector.tolk"

[contracts.HighloadWalletV3]
src = "highload-v3/contracts/HighloadWalletV3.tolk"
depends = []

[contracts.JettonMinter]
src = "jetton-v2/contracts/JettonMinter.tolk"

[[contracts.JettonMinter.depends]]
name = "JettonWallet"
kind = "embed_code"
function = "jettonWalletCompiledCode"

[contracts.JettonWallet]
src = "jetton-v2/contracts/JettonWallet.tolk"
depends = []

[contracts.Multisig]
src = "multisig-v2/contracts/Multisig.tolk"

[[contracts.Multisig.depends]]
name = "Order"
kind = "library_ref"
function = "orderCompiledCodeLibraryRef"

[contracts.NftCollection]
src = "nft/contracts/NftCollection.tolk"
depends = ["NftItem"]

[contracts.NftItem]
src = "nft/contracts/NftItem.tolk"
depends = []

[contracts.NotcoinMinter]
src = "notcoin/contracts/NotcoinMinter.tolk"
depends = []

[contracts.NotcoinWallet]
src = "notcoin/contracts/NotcoinWallet.tolk"
depends = []

[contracts.Order]
src = "multisig-v2/contracts/Order.tolk"
depends = []

[contracts.RootDns]
src = "dns/contracts/RootDns.tolk"
depends = []

[contracts.WalletV5]
src = "w5/contracts/WalletV5.tolk"
depends = []

[test.mutation]
minimum-percent = 75.0

[lint]
max-warnings = 0

[lint.rules]
dict-type-use = "allow"
throw-requires-errors-enum = "allow"

[fmt]
width = 100
ignore = []

[build]
output-fift = "build/fift"

[scripts]
test-counter = "acton test counter/tests"
test-dns = "acton test dns/tests"
test-elector = "acton test elector/tests"
test-highload = "acton test highload-v3/tests"
test-jetton-v2 = "acton test jetton-v2/tests"
test-nft = "acton test nft/tests"
test-notcoin = "acton test notcoin/tests"
test-w5 = "acton test w5/tests"

[import-mappings]
acton = ".acton"
contracts = "contracts"
gen = "gen"
tests = "tests"
wrappers = "wrappers"
