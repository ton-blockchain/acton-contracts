[package]
name = "acton-contracts"
description = "Rewritten Acton contracts monorepo"
version = "0.1.0"
license = "MIT"

[contracts.Config]
src = "config/contracts/Config.tolk"
depends = []

[contracts.Counter]
src = "counter/contracts/Counter.tolk"
depends = []

[contracts.DnsCollection]
src = "dns/contracts/DnsCollection.tolk"
depends = []

[contracts.DnsItem]
src = "dns/contracts/DnsItem.tolk"
depends = []

[contracts.Elector]
src = "elector/contracts/Elector.tolk"

[contracts.HighloadWalletV3]
src = "highload-v3.1/contracts/HighloadWalletV3.tolk"
depends = []

[contracts.JettonMinter]
src = "jetton-v2.1/contracts/JettonMinter.tolk"

[[contracts.JettonMinter.depends]]
name = "JettonWallet"
kind = "embed_code"
function = "jettonWalletCompiledCode"

[contracts.JettonWallet]
src = "jetton-v2.1/contracts/JettonWallet.tolk"
depends = []

[contracts.Multisig]
src = "multisig-v2.1/contracts/Multisig.tolk"

[[contracts.Multisig.depends]]
name = "Order"
kind = "library_ref"
function = "orderCompiledCodeLibraryRef"

[contracts.NftCollection]
src = "nft-v1.1/contracts/NftCollection.tolk"
depends = ["NftItem"]

[contracts.NftItem]
src = "nft-v1.1/contracts/NftItem.tolk"
depends = []

[contracts.NotcoinMinter]
src = "jetton-v1.3/contracts/NotcoinMinter.tolk"
depends = []

[contracts.NotcoinWallet]
src = "jetton-v1.3/contracts/NotcoinWallet.tolk"
depends = []

[contracts.Order]
src = "multisig-v2.1/contracts/Order.tolk"
depends = []

[contracts.RootDns]
src = "dns/contracts/RootDns.tolk"
depends = []

[contracts.WalletV5]
src = "w5.1/contracts/WalletV5.tolk"
depends = []

[test.mutation]
minimum-percent = 75.0

[lint]
max-warnings = 0

[lint.rules]
dict-type-use = "allow"
throw-requires-errors-enum = "allow"

[fmt]
width = 100
ignore = []

[build]
output-fift = "build/fift"

[scripts]
update-wrapper = """
acton wrapper Config -o config/wrappers/Config.gen.tolk &&
acton wrapper Counter -o counter/wrappers/Counter.gen.tolk &&
acton wrapper DnsCollection -o dns/wrappers/DnsCollection.gen.tolk &&
acton wrapper DnsItem -o dns/wrappers/DnsItem.gen.tolk &&
acton wrapper Elector -o elector/wrappers/Elector.gen.tolk &&
acton wrapper HighloadWalletV3 -o highload-v3.1/wrappers/HighloadWalletV3.gen.tolk &&
acton wrapper JettonMinter -o jetton-v2.1/wrappers/JettonMinter.gen.tolk &&
acton wrapper JettonWallet -o jetton-v2.1/wrappers/JettonWallet.gen.tolk &&
acton wrapper Multisig -o multisig-v2.1/wrappers/Multisig.gen.tolk &&
acton wrapper NftCollection -o nft-v1.1/wrappers/NftCollection.gen.tolk &&
acton wrapper NftItem -o nft-v1.1/wrappers/NftItem.gen.tolk &&
acton wrapper NotcoinMinter -o jetton-v1.3/wrappers/NotcoinMinter.gen.tolk &&
acton wrapper NotcoinWallet -o jetton-v1.3/wrappers/NotcoinWallet.gen.tolk &&
acton wrapper Order -o multisig-v2.1/wrappers/Order.gen.tolk &&
acton wrapper RootDns -o dns/wrappers/RootDns.gen.tolk &&
acton wrapper WalletV5 -o w5.1/wrappers/WalletV5.gen.tolk
"""
test-counter = "acton test counter/tests"
test-dns = "acton test dns/tests"
test-elector = "acton test elector/tests"
test-highload = "acton test highload-v3.1/tests"
test-jetton-v2 = "acton test jetton-v2.1/tests"
test-nft = "acton test nft-v1.1/tests"
test-jetton = "acton test jetton-v1.3/tests"
test-w5 = "acton test w5.1/tests"

[import-mappings]
acton = ".acton"
contracts = "contracts"
gen = "gen"
tests = "tests"
wrappers = "wrappers"
